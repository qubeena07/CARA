services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cara_postgres
    environment:
      POSTGRES_DB: cara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cara_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
